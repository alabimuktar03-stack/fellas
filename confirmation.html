<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmation | fellaż</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0710;
        color: #f4f1ea;
        font-family: "Montserrat", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: radial-gradient(ellipse at 50% 0%, #1a0f2e 0%, #07050a 60%);
      }
      .confirmation-card {
        background: #1a151f;
        border: 1px solid #2a2533;
        border-radius: 12px;
        padding: 40px 32px;
        max-width: 560px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
      }
      .confirmation-card .icon {
        font-size: 3.5rem;
        color: #2ecc71;
        text-align: center;
        margin-bottom: 10px;
      }
      .confirmation-card h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.2rem;
        letter-spacing: 2px;
        color: #cba258;
        text-align: center;
        margin-bottom: 8px;
      }
      .confirmation-card .sub {
        text-align: center;
        color: #b9b3c2;
        margin-bottom: 20px;
      }
      .order-summary {
        background: #0f0c13;
        border-radius: 6px;
        padding: 16px;
        margin: 16px 0;
      }
      .order-summary .row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid #1f1a2a;
      }
      .order-summary .row:last-child {
        border-bottom: none;
      }
      .order-summary .label {
        color: #b9b3c2;
        font-size: 0.85rem;
      }
      .order-summary .value {
        font-weight: 600;
        color: #f4f1ea;
      }
      .order-summary .total {
        color: #cba258;
        font-size: 1.1rem;
      }
      .order-items-list {
        margin: 12px 0;
        max-height: 200px;
        overflow-y: auto;
      }
      .order-items-list .item {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 0.9rem;
        border-bottom: 1px solid #1f1a2a;
      }
      .order-items-list .item:last-child {
        border-bottom: none;
      }
      .order-ref {
        background: #0f0c13;
        padding: 6px 14px;
        border-radius: 4px;
        display: inline-block;
        font-family: monospace;
        color: #cba258;
        font-size: 0.8rem;
        margin-top: 8px;
      }
      .btn-group {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 25px;
      }
      .btn {
        padding: 10px 28px;
        border-radius: 4px;
        font-weight: 600;
        text-decoration: none;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .btn-primary {
        background: #cba258;
        color: #0a0a0a;
      }
      .btn-primary:hover {
        background: #dbb768;
        transform: translateY(-2px);
      }
      .btn-secondary {
        background: transparent;
        border: 1px solid #cba258;
        color: #cba258;
      }
      .btn-secondary:hover {
        background: #cba258;
        color: #0a0a0a;
      }
      .footer-note {
        margin-top: 20px;
        font-size: 0.8rem;
        color: #555;
        text-align: center;
      }
      .footer-note a {
        color: #cba258;
      }
      @media (max-width: 480px) {
        .confirmation-card {
          padding: 24px 16px;
        }
        .confirmation-card h1 {
          font-size: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="confirmation-card" id="app">
      <div class="icon"><i class="fas fa-check-circle"></i></div>
      <h1>Thank You, Real One!</h1>
      <p class="sub">Your order has been placed successfully.</p>

      <!-- Order Reference -->
      <div style="text-align: center">
        <span class="order-ref" id="orderRef">#FELLAZ-...</span>
      </div>

      <!-- Order Summary (injected by JS) -->
      <div id="orderSummary" class="order-summary">
        <!-- populated by JavaScript -->
      </div>

      <div class="btn-group">
        <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
        <a href="index.html" class="btn btn-secondary">Back to Home</a>
      </div>
      <div class="footer-note">
        Need help? <a href="contact.html">Contact us</a>
      </div>
    </div>

    <script>
      // Helper to get latest order from localStorage
      function getLatestOrder() {
        const orders = JSON.parse(localStorage.getItem("fellaz_orders")) || [];
        if (orders.length === 0) return null;
        // sort by date descending, pick the newest
        const sorted = orders.sort(
          (a, b) => new Date(b.date) - new Date(a.date),
        );
        return sorted[0];
      }

      // Display order details
      function displayOrder() {
        const order = getLatestOrder();
        const refEl = document.getElementById("orderRef");
        const summaryEl = document.getElementById("orderSummary");

        // Show reference from URL if present, else use order id
        const urlRef = new URLSearchParams(window.location.search).get("ref");
        if (urlRef) {
          refEl.textContent = "#" + urlRef;
        } else if (order && order.id) {
          refEl.textContent = "#" + order.id;
        } else {
          refEl.textContent = "#FELLAZ-MOCK";
        }

        if (!order) {
          summaryEl.innerHTML = `
                    <div style="text-align:center; color:#b9b3c2; padding:10px;">
                        <i class="fas fa-box" style="font-size:2rem; display:block; margin-bottom:8px;"></i>
                        No order details available.
                    </div>
                `;
          return;
        }

        // Build items HTML
        let itemsHtml = "";
        if (order.items && order.items.length) {
          itemsHtml = `<div class="order-items-list">`;
          order.items.forEach((item) => {
            itemsHtml += `
                        <div class="item">
                            <span>${item.name} (${item.size}) × ${item.quantity}</span>
                            <span>₦${(item.price * item.quantity).toLocaleString()}</span>
                        </div>
                    `;
          });
          itemsHtml += `</div>`;
        } else {
          itemsHtml = `<p style="color:#b9b3c2; font-size:0.9rem;">No items found.</p>`;
        }

        // Build address string
        const address = order.address
          ? `${order.address}, ${order.city || ""}, ${order.state || ""}, ${order.country || ""}`
          : "No address provided";

        summaryEl.innerHTML = `
                <div class="row">
                    <span class="label">Order Date</span>
                    <span class="value">${new Date(order.date).toLocaleString()}</span>
                </div>
                <div class="row">
                    <span class="label">Customer</span>
                    <span class="value">${order.customer || "N/A"}</span>
                </div>
                <div class="row">
                    <span class="label">Email</span>
                    <span class="value">${order.email || "N/A"}</span>
                </div>
                <div class="row">
                    <span class="label">Phone</span>
                    <span class="value">${order.phone || "N/A"}</span>
                </div>
                <div class="row">
                    <span class="label">Shipping Address</span>
                    <span class="value" style="font-size:0.85rem;">${address}</span>
                </div>
                <div class="row" style="border-bottom: none; margin-top:8px;">
                    <span class="label">Items</span>
                    <span class="value"></span>
                </div>
                ${itemsHtml}
                <div class="row" style="border-top:1px solid #2a2533; margin-top:8px; padding-top:8px;">
                    <span class="label" style="font-weight:700;">Total</span>
                    <span class="value total">₦${(order.total || 0).toLocaleString()}</span>
                </div>
                <div class="row">
                    <span class="label">Payment Reference</span>
                    <span class="value" style="font-family:monospace; font-size:0.75rem; color:#b9b3c2;">${order.reference || "N/A"}</span>
                </div>
            `;
      }

      // Clear cart after displaying order (so user doesn't see old items)
      localStorage.removeItem("fellaz_cart_items");
      localStorage.setItem("fellaz_cart", "0");

      // Run display
      displayOrder();
    </script>
  </body>
</html>
